name: publish

# Publishes prismhr-mcp to PyPI using trusted publishing (OIDC).
# No API token is ever stored in GitHub Secrets — PyPI verifies the
# workflow's OIDC identity directly.
#
# Trigger: push a git tag that starts with `v`, e.g. `v0.1.0.dev0`, `v0.1.0`.
#
# One-time setup (on PyPI, outside this repo):
#   https://pypi.org/manage/account/publishing/
#     Project name: prismhr-mcp
#     Owner:        nikulk2992-jpg
#     Repo name:    prismhr-mcp
#     Workflow:     publish.yml
#     Environment:  release   (recommended; matches `environment:` below)

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Verify tag matches pyproject version
        id: meta
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(uv run python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} declares version '${tag_version}' but pyproject.toml says '${pkg_version}'."
            exit 1
          fi
          echo "version=${pkg_version}" >> "$GITHUB_OUTPUT"

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run tests before publishing
        run: uv run pytest -q

      - name: Build sdist + wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/prismhr-mcp
    permissions:
      id-token: write  # OIDC token for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` — OIDC only.

  registry:
    # Submit the release to registry.modelcontextprotocol.io after PyPI accepts it.
    # Uses GitHub OIDC — no tokens. The `io.github.nikulk2992-jpg/*` namespace is
    # proven by the workflow's OIDC identity matching the repo owner.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher CLI
        run: |
          set -euo pipefail
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" -o mcp-publisher.tar.gz
          tar xf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --help

      - name: Wait for PyPI to index the new release
        # The registry verifies ownership by re-fetching the package README
        # from PyPI. PyPI's index has a brief lag after upload, so give it
        # a moment before we ask the registry to look.
        run: sleep 45

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
